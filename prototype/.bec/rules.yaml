# =============================================================
#  Reglas BEC (Bound Executable Constraints) de este proyecto
# =============================================================
# Cada regla tiene:
#   - id          : nombre corto y único de la regla
#   - intent      : el PORQUÉ (esto es lo que se pierde hoy entre agentes)
#   - why_it_matters : qué pasa si se rompe
#   - paths       : qué archivos vigila esta regla
#   - check       : el comando que la verifica (pasa/no-pasa)
#   - severity    : blocking = frena el commit | warning = solo avisa
# -------------------------------------------------------------

rules:
  - id: no-token-in-logs
    intent: >
      Los tokens de sesión y credenciales nunca deben llegar a ningún log.
    why_it_matters: >
      Si un token aparece en los logs, cualquiera con acceso a los logs
      puede robar la sesión de un usuario. Es un agujero de seguridad grave.
    rejected_alternatives:
      - "Redactar el token al escribir el log -> muy fácil de saltarse por descuido"
    paths:
      - "src/**/*.py"
    check: "python3 .bec/checks/no_token_in_logs.py"
    severity: blocking

  - id: no-direct-db-in-handlers
    intent: >
      Los manejadores de rutas (handlers) no deben llamar a la base de datos
      directamente; deben pasar por la capa de repositorio.
    why_it_matters: >
      Mezclar acceso a datos con lógica de rutas hace el código imposible
      de testear y de cambiar sin romper cosas.
    paths:
      - "src/handlers/**/*.py"
    check: "python3 .bec/checks/no_direct_db.py"
    severity: warning
