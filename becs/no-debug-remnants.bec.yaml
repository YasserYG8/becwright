becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-debug-remnants
  intent: >
    Debug code (breakpoints, pdb) must not be committed.
  why_it_matters: >
    A forgotten breakpoint hangs the process in production or CI.
  paths:
    - "src/**/*.py"
  severity: blocking
check:
  kind: builtin
  module: debug_remnants
