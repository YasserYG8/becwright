becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-wildcard-imports
  intent: >
    Evitar 'from x import *', que ensucia el namespace.
  why_it_matters: >
    Los imports wildcard ocultan de dónde viene cada nombre y rompen el
    análisis estático.
  paths:
    - "src/**/*.py"
  severity: warning
check:
  kind: builtin
  module: wildcard_imports
