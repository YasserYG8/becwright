becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-wildcard-imports
  intent: >
    Avoid 'from x import *', which pollutes the namespace.
  why_it_matters: >
    Wildcard imports hide where each name comes from and break static analysis.
  paths:
    - "src/**/*.py"
  severity: warning
check:
  kind: builtin
  module: wildcard_imports
