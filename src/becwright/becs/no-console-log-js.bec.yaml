becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-console-log-js
  intent: >
    Avoid 'console.log(...)' in JavaScript/TypeScript code.
  why_it_matters: >
    Debug console.log statements clutter production output and often leak data
    unintentionally.
  paths:
    - "**/*.js"
    - "**/*.ts"
  severity: warning
check:
  kind: builtin
  module: forbid
  args: "--pattern 'console\\.log\\s*\\('"
