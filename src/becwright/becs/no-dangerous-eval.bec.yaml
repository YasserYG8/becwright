becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-dangerous-eval
  intent: >
    Do not use eval() / exec(), which execute arbitrary code.
  why_it_matters: >
    eval/exec on untrusted input is remote code execution.
  paths:
    - "src/**/*.py"
  severity: blocking
check:
  kind: builtin
  module: dangerous_eval
