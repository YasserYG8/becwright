becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-debugger-js
  intent: >
    Do not leave 'debugger;' in JavaScript/TypeScript code.
  why_it_matters: >
    A forgotten 'debugger' halts execution when devtools are open and should
    not reach production.
  paths:
    - "**/*.js"
    - "**/*.ts"
  severity: blocking
check:
  kind: builtin
  module: forbid
  args: "--pattern '\\bdebugger\\b'"
