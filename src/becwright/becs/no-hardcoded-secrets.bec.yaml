becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-hardcoded-secrets
  intent: >
    No secret (key, token, password) should be hardcoded in the code.
  why_it_matters: >
    A secret in the repo stays in git history forever and is visible to anyone
    with access to the code.
  paths:
    - "src/**/*.py"
  severity: blocking
check:
  kind: builtin
  module: hardcoded_secrets
