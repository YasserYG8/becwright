becwright_bec: 1
exported_from: https://github.com/DataDave-Dev/becwright
rule:
  id: no-token-in-logs
  intent: >
    Session tokens and credentials must never reach any log.
  why_it_matters: >
    If a token shows up in the logs, anyone with access to them can steal a
    user's session.
  paths:
    - "src/**/*.py"
  severity: blocking
check:
  kind: builtin
  module: no_token_in_logs
