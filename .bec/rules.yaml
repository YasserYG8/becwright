# BECs that becwright applies to itself (dogfooding).
rules:
  - id: comments-only-when-complex
    intent: >
      Comments are reserved for complex code; if the code is self-explanatory,
      it is not commented.
    why_it_matters: >
      Comments that restate the obvious age badly, lie when the code changes
      and add noise without information.
    rejected_alternatives:
      - "Forbid all comments -> the 'why' of complex code is lost"
      - "Blocking check -> the heuristic gives false positives; better to warn"
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
    check: "python3 -m becwright.checks.redundant_comments"
    severity: warning
