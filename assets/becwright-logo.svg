<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="becwright">
  <defs>
    <filter id="bwSubtleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexágono base (grafito) -->
  <path d="M100 20 L170 60 V140 L100 180 L30 140 V60 L100 20 Z" fill="#1F2937" filter="url(#bwSubtleShadow)"/>

  <!-- Detalles de precisión técnica en los vértices -->
  <circle cx="100" cy="20" r="1.5" fill="#BEF264" opacity="0.6"/>
  <circle cx="170" cy="60" r="1.5" fill="#BEF264" opacity="0.6"/>
  <circle cx="170" cy="140" r="1.5" fill="#BEF264" opacity="0.6"/>
  <circle cx="100" cy="180" r="1.5" fill="#BEF264" opacity="0.6"/>
  <circle cx="30" cy="140" r="1.5" fill="#BEF264" opacity="0.6"/>
  <circle cx="30" cy="60" r="1.5" fill="#BEF264" opacity="0.6"/>

  <!-- Núcleo: play + barra de verificación (verde lima) -->
  <rect x="62" y="65" width="8" height="70" rx="4" fill="#BEF264"/>
  <path d="M85 65 V135 L145 100 Z" fill="#BEF264" stroke-linejoin="round"/>

  <!-- Línea de conexión lógica -->
  <path d="M100 25 V50 M35 65 L55 75 M165 65 L145 75" stroke="#BEF264" stroke-width="1" opacity="0.3" fill="none"/>
</svg>
