<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470" role="img" aria-label="becwright blocking a commit live: git commit runs, two blocking rules fire, the commit is stopped" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <style>
    .l { opacity: 0; animation: reveal .01s steps(1) forwards; }
    @keyframes reveal { to { opacity: 1; } }
    .type {
      clip-path: inset(0 100% 0 0);
      animation: typing 1.4s steps(34, end) .4s forwards;
    }
    @keyframes typing { to { clip-path: inset(0 0 0 0); } }
    .cursor { opacity: 0; animation: reveal .01s steps(1) 6.6s forwards, blink 1.1s steps(1) 6.6s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .d20 { animation-delay: 2.0s; }
    .d26 { animation-delay: 2.6s; }
    .d28 { animation-delay: 2.8s; }
    .d30 { animation-delay: 3.0s; }
    .d40 { animation-delay: 4.0s; }
    .d42 { animation-delay: 4.2s; }
    .d44 { animation-delay: 4.4s; }
    .d56 { animation-delay: 5.6s; }
    .d66 { animation-delay: 6.6s; }
  </style>

  <!-- window -->
  <rect x="0" y="0" width="760" height="470" rx="12" fill="#111827"/>
  <rect x="0" y="0" width="760" height="36" rx="12" fill="#1F2937"/>
  <rect x="0" y="24" width="760" height="12" fill="#1F2937"/>
  <circle cx="22" cy="18" r="5" fill="#EF4444"/>
  <circle cx="42" cy="18" r="5" fill="#F59E0B"/>
  <circle cx="62" cy="18" r="5" fill="#22C55E"/>
  <text x="380" y="22" text-anchor="middle" fill="#9CA3AF">git commit — guarded by becwright</text>

  <!-- $ git commit (typed) -->
  <text x="24" y="68"><tspan fill="#BEF264" font-weight="700">$</tspan><tspan class="type" fill="#F9FAFB"> git commit -m "checkout: promo discounts"</tspan></text>

  <!-- BEC banner -->
  <text x="24" y="104" class="l d20" fill="#F9FAFB" font-weight="700">BEC -- 1 file(s) against 2 rule(s)</text>

  <!-- BLOCK 1 -->
  <text x="24" y="140" class="l d26"><tspan fill="#F87171" font-weight="700">  BLOCK</tspan><tspan fill="#E5E7EB">  no-hardcoded-secrets  </tspan><tspan fill="#F87171" font-weight="700">(blocking)</tspan></text>
  <text x="24" y="162" class="l d28" fill="#9CA3AF">        Why it matters: a secret stays in git history forever.</text>
  <text x="24" y="184" class="l d30"><tspan fill="#9CA3AF">        checkout.py:2  </tspan><tspan fill="#E5E7EB">&gt; api_key = "x7Kp2mQ9vT4nB8wL"</tspan></text>

  <!-- BLOCK 2 -->
  <text x="24" y="220" class="l d40"><tspan fill="#F87171" font-weight="700">  BLOCK</tspan><tspan fill="#E5E7EB">  no-dangerous-eval     </tspan><tspan fill="#F87171" font-weight="700">(blocking)</tspan></text>
  <text x="24" y="242" class="l d42" fill="#9CA3AF">        Why it matters: eval on untrusted input is remote code execution.</text>
  <text x="24" y="264" class="l d44"><tspan fill="#9CA3AF">        checkout.py:4  </tspan><tspan fill="#E5E7EB">&gt; discount = eval(rule)</tspan></text>

  <!-- verdict -->
  <text x="24" y="308" class="l d56" fill="#F87171" font-weight="700">&gt;&gt;&gt; Commit BLOCKED: becwright caught it before it shipped.</text>

  <!-- closing prompt -->
  <text x="24" y="352" class="l d66" fill="#9CA3AF">Rules that run, not notes that get ignored.</text>
  <text x="24" y="392" class="l d66"><tspan fill="#BEF264" font-weight="700">$</tspan><tspan fill="#F9FAFB"> npx becwright demo</tspan><tspan fill="#9CA3AF">   # try it — nothing installed, nothing touched</tspan></text>
  <text x="24" y="430"><tspan class="l d66" fill="#BEF264" font-weight="700">$ </tspan><tspan class="cursor" fill="#BEF264" font-weight="700">▊</tspan></text>
</svg>
